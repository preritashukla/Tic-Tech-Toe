version: '3.8'

services:
  jira-mock:
    build: ./mocks/jira
    ports:
      - "8001:8001"
    env_file:
      - .env

  github-mock:
    build: ./mocks/github
    ports:
      - "8002:8002"
    env_file:
      - .env

  slack-mock:
    build: ./mocks/slack
    ports:
      - "8003:8003"
    env_file:
      - .env

  sheets-mock:
    build: ./mocks/sheets
    ports:
      - "8004:8004"
    env_file:
      - .env